name: Bug report
description: Report something that is broken or confusing in DockTUI.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve DockTUI. Clear reproduction steps make fixes much faster.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run docktui
        2. Press ...
        3. See ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: python --version
    validations:
      required: false
  - type: input
    id: docker
    attributes:
      label: Docker version
      placeholder: docker --version
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Terminal output
      description: Paste any relevant output or traceback.
      render: text
    validations:
      required: false
