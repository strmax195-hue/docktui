<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">DockTUI terminal preview</title>
  <desc id="desc">A terminal-style preview of DockTUI showing container rows, resource bars, and available actions.</desc>
  <rect width="980" height="560" fill="#111317"/>
  <rect x="24" y="24" width="932" height="512" rx="10" fill="#171a20" stroke="#343a46" stroke-width="2"/>
  <rect x="24" y="24" width="932" height="38" rx="10" fill="#242936"/>
  <circle cx="48" cy="43" r="6" fill="#ff5f56"/>
  <circle cx="70" cy="43" r="6" fill="#ffbd2e"/>
  <circle cx="92" cy="43" r="6" fill="#27c93f"/>
  <text x="490" y="48" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="15" fill="#cfd6e6">docktui</text>
  <text x="490" y="96" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="22" font-weight="700" fill="#67e8f9">DockTUI Container Dashboard</text>
  <rect x="52" y="122" width="170" height="30" rx="4" fill="#2563eb"/>
