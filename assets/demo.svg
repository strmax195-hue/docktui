<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">DockTUI terminal preview</title>
  <desc id="desc">A terminal-style preview of DockTUI showing Compose grouping, container details, advanced logs, volumes, networks, and cleanup actions.</desc>
  <rect width="1100" height="640" fill="#101216"/>
  <rect x="24" y="24" width="1052" height="592" rx="10" fill="#171a20" stroke="#343a46" stroke-width="2"/>
  <rect x="24" y="24" width="1052" height="38" rx="10" fill="#242936"/>
  <circle cx="48" cy="43" r="6" fill="#ff5f56"/>
  <circle cx="70" cy="43" r="6" fill="#ffbd2e"/>
  <circle cx="92" cy="43" r="6" fill="#27c93f"/>
  <text x="550" y="48" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="15" fill="#cfd6e6">docktui --refresh-interval 2 --docker-timeout 10</text>

  <text x="550" y="96" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="23" font-weight="700" fill="#67e8f9">DockTUI Docker Dashboard</text>

  <rect x="50" y="120" width="150" height="30" rx="4" fill="#2563eb"/>
  <text x="68" y="140" font-family="Consolas, Menlo, monospace" font-size="14" fill="#ffffff">Containers (1)</text>
  <rect x="214" y="120" width="128" height="30" rx="4" fill="#1d4ed8"/>
  <text x="232" y="140" font-family="Consolas, Menlo, monospace" font-size="14" fill="#ffffff">Compose (2)</text>
  <text x="362" y="140" font-family="Consolas, Menlo, monospace" font-size="14" fill="#aab4c4">[Images (3)]</text>
  <text x="482" y="140" font-family="Consolas, Menlo, monospace" font-size="14" fill="#aab4c4">[Volumes (4)]</text>
  <text x="610" y="140" font-family="Consolas, Menlo, monospace" font-size="14" fill="#aab4c4">[Networks (5)]</text>
  <text x="760" y="140" font-family="Consolas, Menlo, monospace" font-size="14" fill="#facc15">[filter: app | sort: state]</text>

  <line x1="50" y1="166" x2="1050" y2="166" stroke="#3f4654"/>

  <text x="62" y="196" font-family="Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#f2f5f9">PROJECT / SERVICE</text>
  <text x="286" y="196" font-family="Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#f2f5f9">CONTAINER</text>
  <text x="494" y="196" font-family="Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#f2f5f9">STATE</text>
  <text x="604" y="196" font-family="Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#f2f5f9">IMAGE</text>

  <rect x="50" y="214" width="620" height="34" rx="4" fill="#242936"/>
  <text x="62" y="236" font-family="Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#67e8f9">myshop  (4)</text>
  <rect x="50" y="254" width="620" height="34" rx="4" fill="#1d4ed8"/>
  <text x="62" y="276" font-family="Consolas, Menlo, monospace" font-size="14" fill="#ffffff">» api</text>
  <text x="286" y="276" font-family="Consolas, Menlo, monospace" font-size="14" fill="#ffffff">myshop-api-1</text>
  <text x="494" y="276" font-family="Consolas, Menlo, monospace" font-size="14" fill="#ffffff">running</text>
  <text x="604" y="276" font-family="Consolas, Menlo, monospace" font-size="14" fill="#ffffff">myshop/api:dev</text>
  <text x="62" y="316" font-family="Consolas, Menlo, monospace" font-size="14" fill="#cbd5e1">  db</text>
  <text x="286" y="316" font-family="Consolas, Menlo, monospace" font-size="14" fill="#cbd5e1">myshop-db-1</text>
  <text x="494" y="316" font-family="Consolas, Menlo, monospace" font-size="14" fill="#86efac">running</text>
  <text x="604" y="316" font-family="Consolas, Menlo, monospace" font-size="14" fill="#cbd5e1">postgres:15</text>
  <text x="62" y="356" font-family="Consolas, Menlo, monospace" font-size="14" fill="#cbd5e1">  redis</text>
  <text x="286" y="356" font-family="Consolas, Menlo, monospace" font-size="14" fill="#cbd5e1">myshop-redis-1</text>
