  <text x="82" y="558" font-family="Consolas, Menlo, monospace" font-size="14" fill="#86efac">MEM: [██████░░░░░░░░░░] 36.8% (612MiB / 1.6GiB)</text>
  <text x="82" y="584" font-family="Consolas, Menlo, monospace" font-size="14" fill="#86efac">NET: 18.2MB / 4.7MB</text>

  <rect x="700" y="178" width="330" height="146" rx="6" fill="#111827" stroke="#374151"/>
  <text x="718" y="206" font-family="Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#67e8f9">DETAILS VIEW (V)</text>
  <text x="718" y="232" font-family="Consolas, Menlo, monospace" font-size="13" fill="#cbd5e1">Ports: 0.0.0.0:8080 -> 8000/tcp</text>
  <text x="718" y="256" font-family="Consolas, Menlo, monospace" font-size="13" fill="#cbd5e1">Mounts: ./app -> /app (rw)</text>
  <text x="718" y="280" font-family="Consolas, Menlo, monospace" font-size="13" fill="#cbd5e1">Networks: myshop_default</text>
  <text x="718" y="304" font-family="Consolas, Menlo, monospace" font-size="13" fill="#cbd5e1">Restart: unless-stopped</text>

  <rect x="700" y="342" width="330" height="122" rx="6" fill="#111827" stroke="#374151"/>
  <text x="718" y="370" font-family="Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#67e8f9">LOGS VIEW</text>
  <text x="718" y="394" font-family="Consolas, Menlo, monospace" font-size="13" fill="#facc15">[FOLLOW] [SEARCH: error] [ERRORS]</text>
  <text x="718" y="418" font-family="Consolas, Menlo, monospace" font-size="13" fill="#cbd5e1">2026-06-04T12:14 api started</text>
  <text x="718" y="442" font-family="Consolas, Menlo, monospace" font-size="13" fill="#f87171">2026-06-04T12:15 error retrying db</text>

  <rect x="700" y="482" width="330" height="76" rx="6" fill="#111827" stroke="#374151"/>
  <text x="718" y="510" font-family="Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#67e8f9">EXEC PRESETS</text>
  <text x="718" y="536" font-family="Consolas, Menlo, monospace" font-size="13" fill="#cbd5e1">1 sh  2 bash  3 env  4 ls -la  5 os-release</text>

  <line x1="50" y1="602" x2="1050" y2="602" stroke="#3f4654"/>
  <text x="62" y="626" font-family="Consolas, Menlo, monospace" font-size="13" fill="#67e8f9">[S] Start/Stop group | [R] Restart | [L] Logs | [V] Details | [E] Exec | [O] Sort | [Y] State | [P] Prune | [?] Help</text>
</svg>
