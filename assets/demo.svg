  <text x="610" y="200" font-family="Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#f2f5f9">STATE</text>
  <text x="720" y="200" font-family="Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#f2f5f9">STATUS</text>
  <rect x="52" y="218" width="876" height="34" rx="4" fill="#1d4ed8"/>
  <text x="62" y="240" font-family="Consolas, Menlo, monospace" font-size="14" fill="#ffffff">c1234abcde</text>
