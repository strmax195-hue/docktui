  <text x="62" y="398" font-family="Consolas, Menlo, monospace" font-size="14" font-weight="700" fill="#67e8f9">(standalone)  (1)</text>
  <text x="62" y="438" font-family="Consolas, Menlo, monospace" font-size="14" fill="#cbd5e1">  worker</text>
  <text x="286" y="438" font-family="Consolas, Menlo, monospace" font-size="14" fill="#cbd5e1">backup-worker</text>
  <text x="494" y="438" font-family="Consolas, Menlo, monospace" font-size="14" fill="#86efac">running</text>
  <text x="604" y="438" font-family="Consolas, Menlo, monospace" font-size="14" fill="#cbd5e1">python:3.12</text>

  <line x1="50" y1="466" x2="670" y2="466" stroke="#3f4654"/>
  <text x="62" y="500" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="700" fill="#67e8f9">CONTAINER RESOURCE USAGE</text>
